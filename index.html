<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Falling Arsenal — Rocket Shooter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ════════════════════════════════════════
       HOME / MENU SCREEN
  ════════════════════════════════════════ -->
  <div id="home-screen">
    <canvas id="menuCanvas"></canvas><!-- animated starfield -->

    <div class="home-content">

      <!-- Game Logo -->
      <div class="logo-wrap">
        <p class="logo-eyebrow">ROCKET SHOOTER</p>
        <h1 class="logo-title">FALLING<br/><span class="logo-accent">ARSENAL</span></h1>
        <div class="logo-divider"></div>
      </div>

      <!-- Difficulty selector -->
      <p class="section-label">SELECT DIFFICULTY</p>
      <div class="diff-row">
        <button class="diff-btn" data-diff="easy">
          <span class="diff-name">EASY</span>
          <span class="diff-desc">Slow enemies · 5 HP · 1.5× score</span>
        </button>
        <button class="diff-btn active" data-diff="medium">
          <span class="diff-name">MEDIUM</span>
          <span class="diff-desc">Balanced · 3 HP · 1× score</span>
        </button>
        <button class="diff-btn" data-diff="hard">
          <span class="diff-name">HARD</span>
          <span class="diff-desc">Fast · 2 HP · 2× score</span>
        </button>
      </div>

      <!-- Launch -->
      <button id="home-start-btn" class="primary-btn pulse">LAUNCH MISSION</button>

      <!-- Audio toggle -->
      <button id="home-mute-btn" class="ghost-btn">
        <span id="home-mute-icon">🔊</span>&nbsp;AUDIO ON
      </button>

      <!-- How to Play accordion -->
      <details class="how-to-play">
        <summary>HOW TO PLAY ▾</summary>
        <div class="htp-grid">
          <span class="htp-key"><kbd>W A S D</kbd> / <kbd>Arrows</kbd></span><span>Move your rocket</span>
          <span class="htp-key"><kbd>SPACE</kbd></span><span>Manual burst fire</span>
          <span class="htp-key"><kbd>P</kbd> / <kbd>ESC</kbd></span><span>Pause · Resume</span>
          <span class="htp-key">🛡 SHIELD</span><span>Block one collision</span>
          <span class="htp-key">⚡ TURBO</span><span>Boost movement speed</span>
          <span class="htp-key">✕ MULTI</span><span>Triple shots + 2× score</span>
        </div>
      </details>

    </div><!-- /.home-content -->
  </div><!-- /#home-screen -->


  <!-- ════════════════════════════════════════
       GAME WRAPPER
  ════════════════════════════════════════ -->
  <div id="game-wrapper" class="hidden">
    <canvas id="gameCanvas" width="1080" height="675"></canvas>

    <!-- In-game icon buttons (pause + mute) -->
    <div id="hud-btns">
      <button id="pause-btn"   class="hud-icon-btn" title="Pause (P)">⏸</button>
      <button id="ingame-mute" class="hud-icon-btn" title="Mute">🔊</button>
    </div>

    <!-- PAUSE overlay -->
    <div id="pause-screen" class="overlay-panel hidden">
      <h2 class="panel-title cyan">PAUSED</h2>
      <button id="resume-btn" class="primary-btn">RESUME</button>
      <button id="quit-btn"   class="ghost-btn">QUIT TO MENU</button>
    </div>

    <!-- GAME OVER overlay -->
    <div id="gameover-screen" class="overlay-panel hidden">
      <h1 class="panel-title red">MISSION<br/>FAILED</h1>
      <div class="go-score-wrap">
        <div class="go-block">
          <span class="go-label">SCORE</span>
          <span id="go-score" class="go-value gold">0</span>
        </div>
        <div class="go-block" id="go-hs-block">
          <span class="go-label">BEST</span>
          <span id="go-highscore" class="go-value cyan">0</span>
        </div>
      </div>
      <div id="new-hs-badge" class="hidden">⭐ NEW HIGH SCORE!</div>
      <button id="restart-btn" class="primary-btn">PLAY AGAIN</button>
      <button id="go-menu-btn" class="ghost-btn">MAIN MENU</button>
    </div>

    <!-- Touch D-Pad (visible on mobile) -->
    <div id="touch-zone">
      <div id="dpad">
        <button class="dp" data-key="ArrowUp">▲</button>
        <div class="dp-row">
          <button class="dp" data-key="ArrowLeft">◀</button>
          <div class="dp-center"></div>
          <button class="dp" data-key="ArrowRight">▶</button>
        </div>
        <button class="dp" data-key="ArrowDown">▼</button>
      </div>
      <button id="touch-fire">FIRE</button>
    </div>
  </div><!-- /#game-wrapper -->

  <script src="script.js"></script>
</body>
</html>
